name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BAC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python manage.py check
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_USE_SQLITE_FOR_TESTS: "True"
      - run: python manage.py test catalogo
        env:
          DJANGO_SECRET_KEY: ci-secret-key
          DJANGO_DEBUG: "True"
          DJANGO_USE_SQLITE_FOR_TESTS: "True"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Fra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:8000/api
